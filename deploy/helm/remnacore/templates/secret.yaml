{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "remnacore.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "remnacore.labels" . | nindent 4 }}
type: Opaque
data:
  # Full DATABASE_URL with embedded password (consumed directly by the app)
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:%d/%s?sslmode=disable" .Values.config.database.user .Values.secrets.databasePassword .Values.config.database.host (.Values.config.database.port | int) .Values.config.database.name | b64enc | quote }}
  REMNAWAVE_API_TOKEN: {{ .Values.secrets.remnawaveApiToken | b64enc | quote }}
  REMNAWAVE_WEBHOOK_SECRET: {{ .Values.secrets.remnawaveWebhookSecret | b64enc | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | b64enc | quote }}
  # JWT keys mounted as files via volume
  jwt-private.pem: {{ .Values.secrets.jwtPrivateKey | b64enc | quote }}
  jwt-public.pem: {{ .Values.secrets.jwtPublicKey | b64enc | quote }}
{{- end }}
