{{- if .Values.subscriptionProxy.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "remnacore.fullname" . }}-subproxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "remnacore.labels" . | nindent 4 }}
    app.kubernetes.io/component: subproxy
spec:
  type: {{ .Values.subscriptionProxy.service.type }}
  ports:
    - port: {{ .Values.subscriptionProxy.service.port }}
      targetPort: subproxy
      protocol: TCP
      name: subproxy
  selector:
    {{- include "remnacore.selectorLabels" . | nindent 4 }}
{{- end }}
