run:
  timeout: 5m # Maximum time for linter to run

linters:
  enable:
    - errcheck       # Check for unchecked errors
    - gosimple       # Suggest code simplifications
    - govet          # Report suspicious constructs
    - ineffassign    # Detect unused variable assignments
    - staticcheck    # Advanced static analysis
    - unused         # Find unused code
    - gofmt          # Enforce standard formatting
    - goimports      # Enforce import ordering
    - misspell       # Catch common spelling mistakes
    - gosec          # Security-oriented checks
    - bodyclose      # Ensure HTTP response bodies are closed

issues:
  exclude-dirs:
    - internal/adapter/postgres/gen # Auto-generated sqlc code
